{{ define "main" }}
<div class="container py-4 position-relative">
    <!-- Hero / Title -->
    <div class="text-center py-5 position-relative">
        <div class="aur aur-a" style="top:-50px; left:15%; opacity:.15; pointer-events: none;"></div>
        <div class="aur aur-b" style="bottom:-50px; right:15%; opacity:.15; pointer-events: none;"></div>
        
        <span class="hbadge mb-3 d-inline-flex"><span class="bdot"></span>Biblioteca Técnica</span>
        <h1 style="font-size:clamp(2.2rem, 5vw, 3.8rem); font-weight:800; letter-spacing:-.025em; line-height:1.1; margin-bottom:18px; color: var(--tx);">
           Recursos de <span class="gt">Descarga</span>
        </h1>
        <p class="mx-auto" style="max-width: 680px; font-size:1.1rem; color:var(--tx2); margin-bottom:30px;">
           Descarga mis libros, guías y presentaciones completas sobre Kubernetes, Arquitectura Cloud Native, seguridad y automatización avanzada.
        </p>
    </div>
    
    {{ partial "recursos-descargables" . }}
</div>
{{ end }}
